<!-- BUTTON SIZE FIXED FOR GAME VIEWER TOOLBAR -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
      <title>Google Classrooms</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Google Classrooms Favicon -->
  <link rel="icon" href="https://ssl.gstatic.com/classroom/ic_product_classroom_32.png" sizes="32x32" type="image/png">
  <!-- Material Symbols (for search icon) -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=search" />
  <!-- Fancy header font -->
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --bg: #020409;
            --panel: #111;
            --card: #111;
            --accent: #fff;
            --text: #fff;
            --fade: #222;
            --border: #333;
        }
        html, body {
            background: linear-gradient(180deg, #020409 0%, #08101d 100%);
            color: var(--text);
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            position: relative;
        }
        #spark-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.22;
        }
        body > * {
            position: relative;
            z-index: 1;
        }
        header {
            background: var(--panel);
            padding: 0.9em 0 1em 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid var(--border);
        }
        .logo {
            font-size: 2.2em;
            color: var(--accent);
            font-weight: bold;
            letter-spacing: 2px;
            margin-right: 1.3em;
        }
        .header-btns {
            margin-left: auto;
            display: flex;
            gap: 1.2em;
        }
        .header-btns button, .header-btns a {
            background: transparent;
            border: 1.5px solid rgba(255,255,255,0.18);
            color: var(--accent);
            font-weight: 600;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.96rem;
            transition: border-color .2s, color .2s, transform .2s;
            cursor: pointer;
            text-decoration: none;
        }
        .header-btns button:hover, .header-btns a:hover {
            border-color: rgba(255,255,255,0.36);
            color: #fff;
            transform: translateY(-1px);
        }
        main {
            max-width: 1200px;
            margin: 3em auto 0 auto;
        }
        #promoBox {
            width: 100%;
            max-width: 100%;
            max-height: 260px;
            aspect-ratio: 2.8/1;
            background: #000;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 1.3em;
            border: 2px solid rgba(255,255,255,0.08);
            box-shadow: 0 8px 26px rgba(0,0,0,0.35);
            cursor: pointer;
            transition: box-shadow .14s, border .16s;
        }
        #promoBox:hover {
            border: 3.8px solid #fff;
            box-shadow: 0 14px 96px #fff2, 0 1px 10px #fff2;
        }
        #promoBox img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 1.8em;
            flex-wrap: wrap;
        }
        #searchBar {
            flex: 3;
            font-size: 1.1em;
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: 7px;
            padding: 0.85em 1em;
            color: var(--text);
            outline: none;
        }
        #searchBar:focus {
            border: 2px solid var(--accent);
        }
        #sortOptions {
            flex: 1.1;
            font-size: 1.15em;
            background: var(--card);
            border: 2px solid var(--border);
            padding: 1em 1.15em;
            border-radius: 7px;
            color: var(--accent);
        }
        #randomZoneBtn {
            font-size: 1rem;
            padding: .65em 1.2em;
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 7px;
            background: transparent;
            color: var(--accent);
            font-weight: 600;
            transition: border-color .16s, color .16s, transform .16s;
        }
        #randomZoneBtn:hover {
            border-color: #62b6ff;
            color: #fff;
            transform: translateY(-1px);
        }
        .zone-list {
            display: flex;
            flex-wrap: wrap;
            gap: 2em;
            justify-content: center;
            margin-bottom: 2.5em;
        }
        .zone-list.three-cols {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2em;
            justify-items: center;
        }
        @media (max-width: 900px) {
            .zone-list.three-cols {
                grid-template-columns: repeat(1, 1fr);
            }
        }
        .zone-item {
            background: linear-gradient(180deg, #0a0f18, #11161f);
            border-radius: 22px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.24);
            padding: 1.2em 1em 1.6em 1em;
            width: 310px;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            border: 1px solid rgba(98,182,255,0.16);
            transition: box-shadow .18s, border .15s, background .16s, transform .16s;
            margin-bottom: 0.9em;
        }
        .zone-item:hover, .zone-item:focus-within {
            border-color: rgba(98,182,255,0.32);
            background: linear-gradient(180deg, #111a27, #141d30);
            box-shadow: 0 14px 46px rgba(0,0,0,0.26);
            transform: translateY(-1px);
        }
        .zone-item.selected {
            border-color: #62b6ff;
            background: linear-gradient(180deg, #0d1625, #101a2b);
            box-shadow: 0 24px 140px rgba(98,182,255,0.24), 0 12px 50px rgba(0,0,0,0.30);
        }
        .zone-item img {
            width: 210px;
            height: 182px;
            object-fit: cover;
            border-radius: 18px;
            margin-bottom: 1.1em;
            box-shadow: 0 10px 42px rgba(98,182,255,0.18), 0 2px 10px rgba(0,0,0,0.28);
            background: radial-gradient(circle at top, rgba(98,182,255,0.12), transparent 45%);
        }
        .zone-item button {
            margin-top: 0.8em;
            width: auto;
            padding: 0.65em 1.05em;
            border: 1px solid rgba(255,255,255,0.2);
            background: transparent;
            color: #eef5ff;
            font-size: 0.98rem;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: none;
            transition: border-color .16s, color .16s, transform .16s;
        }
        .zone-item button:hover {
            border-color: #62b6ff;
            color: #fff;
            transform: translateY(-1px);
        }
        #allSummary {
            margin:1.7em 0 1.1em;
            color: var(--accent);
            font-size: 1.5em;
            font-weight: 800;
            text-align: left;
        }
        #zoneViewer {
            display: none;
            background: #000;
            position: fixed;
            z-index: 12;
            left: 0; right: 0; top: 0; bottom: 0;
            width: 100vw; height: 100vh;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #zoneFrame {
            width: 92vw;
            height: 80vh;
            border: none;
            background: #000;
            border-radius: 22px;
            margin:1.1em 0;
        }
        /* FIX BUTTON SIZE FOR GAME VIEWER TOOLBAR */
        .zone-viewer-bar {
            background: linear-gradient(135deg, #08141f, #121f2c);
            width: 92vw;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #eef5ff;
            padding: 1em 2.3em;
            border-radius: 18px 18px 0 0;
            font-size: 1.22em;
            border-bottom: 1px solid rgba(98,182,255,0.22);
            box-shadow: inset 0 -1px 0 rgba(255,255,255,0.08);
        }
        .zone-viewer-bar a {
            color: #8dc7ff;
        }
        .zone-viewer-bar span:last-child {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .zone-viewer-bar button, #zoneViewer-close {
            background: transparent;
            color: #eef5ff;
            border: 1px solid rgba(238,243,255,0.24);
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            padding: .7em 1.2em;
            font-weight: 700;
            box-sizing: border-box;
            transition: border-color .16s, color .16s, transform .16s;
        }
        .zone-viewer-bar button:hover, #zoneViewer-close:hover {
            border-color: #62b6ff;
            color: #fff;
            transform: translateY(-1px);
        }
        #mute {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.18);
            color: var(--accent);
            border-radius: 10px;
            font-size: 1rem;
            padding: .7em 1em;
            cursor: pointer;
            transition: border-color .16s, color .16s, transform .16s;
        }
        #mute:hover {
            border-color: #62b6ff;
            color: #fff;
            transform: translateY(-1px);
        }
        #statusBar {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto 1.5em;
            padding: 1em 1.2em;
            border-radius: 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            color: #ddd;
            font-size: 1em;
            text-align: center;
            box-shadow: 0 10px 35px rgba(0,0,0,0.18);
        }
        .zone-item.selected {
            border: 2.7px solid #62b6ff;
            background: #121622;
            box-shadow: 0 18px 120px rgba(98,182,255,0.15), 0 6px 40px rgba(0,0,0,0.18);
        }
        /* Extra: make the close button match in size too */
        #zoneViewer-close {
            background: transparent;
            color: #eef5ff;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.22);
            font-size: 1rem;
            padding: .7em 1.2em;
            font-weight: 600;
            margin-left: 0 !important;
        }
        @media (max-width:900px) {
          .zone-item { width: 90vw !important; min-height: initial; }
          #zoneFrame, .zone-viewer-bar { width: 98vw; }
        }
        .footer {
            text-align: center;
            color: #bbb;
            font-size: 1em;
            margin: 2.2em 0 0 0;
            padding-bottom: 2em;
        }
        #popupOverlay {
            background: rgba(0,0,0,0.89);
            position: fixed;
            z-index: 30;
            left:0; right:0; top:0; bottom:0;
            width: 100vw; height: 100vh;
            display: none;
            align-items: center;
            justify-content: center;
        }
        #popupContent {
            background: var(--panel);
            box-shadow: 0 8px 40px #000c;
            border-radius: 13px;
            max-width: 430px;
            width: 94vw;
            padding: 2.1em 2em;
            color: var(--text);
            display: flex;
            flex-direction: column;
            gap: 1.3em;
        }
        #popupTitle {
            font-size: 1.3em;
            color: var(--accent);
            font-weight: 700;
        }
        #popupBody {
            font-size: 1em;
            color: var(--text);
        }
        #popupClose {
            margin-left: auto;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.18);
            color: var(--accent);
            border-radius: 8px;
            font-size: 1.15em;
            padding: .45em 1em;
            cursor:pointer;
            transition: border-color .16s, color .16s, transform .16s;
        }
        #popupClose:hover {
            border-color: #62b6ff;
            color:#fff;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <canvas id="spark-canvas"></canvas>
    <header>
        <div class="logo">
            RIsks v2
        </div>
        <div class="header-btns">
            <button id="settings">☰</button>
            <a href="#" onclick="showContact()">Contact</a>
            <a href="#" onclick="loadPrivacy()">Privacy</a>
            <a href="#" onclick="loadDMCA()">DMCA</a>
        </div>
    </header>
    <main>
        <!-- Promo Box - Picked image -->
        <div id="promoBox" onclick="scrollToPopular()">
            <img src="https://cdn.jsdelivr.net/gh/gnmathcopy/covers@main/1.png" alt="Popular Games" />
        </div>
        <div class="toolbar">
            <input type="text" id="searchBar" placeholder="Search games..." oninput="filterZones()" autocomplete="off">
            <select id="sortOptions" onchange="sortZones()">
                <option value="popular">Sort: Popular</option>
                <option value="name">Sort: Name</option>
                <option value="id">Sort: Newest</option>
            </select>
            <button id="randomZoneBtn" title="Random Game">🎲</button>
            <button id="mute" title="Toggle audio">🔇</button>
        </div>
        <div id="statusBar">Loading games...</div>
        <div id="allSummary">All Games</div>
        <div id="container" class="zone-list three-cols"></div>
        <!-- Popular (top 6) will be here upon clicking #promoBox -->
        <div id="popularGamesSection" style="display:none; margin-top:2.3em;">
            <div style="font-size:2em;font-weight:700;margin-bottom:1em;color:#fff;text-align:left;">Popular Games</div>
            <div id="popularGames" class="zone-list three-cols"></div>
        </div>
    </main>
    <div id="zoneViewer">
        <div class="zone-viewer-bar">
            <span>
                <b id="zoneName">[Game Name]</b> (<span id="zoneId"></span>)
                <span id="zoneAuthorBox">by <a href="#" id="zoneAuthor">Unknown</a></span>
            </span>
            <span>
                <button onclick="downloadZone()" title="Download game HTML">⬇</button>
                <button onclick="aboutBlank()" title="about:blank">↗</button>
                <button onclick="fullscreenZone()" title="Fullscreen">⛶</button>
                <button id="zoneViewer-close" onclick="closeZone()">✕</button>
            </span>
        </div>
        <iframe id="zoneFrame" allowfullscreen referrerpolicy="no-referrer"></iframe>
    </div>
    <!-- Popup Overlay -->
    <div id="popupOverlay">
      <div id="popupContent">
        <div style="display: flex;">
            <span id="popupTitle">Popup</span>
            <button id="popupClose" onclick="closePopup()">✕</button>
        </div>
        <div id="popupBody"></div>
      </div>
    </div>

    <footer class="footer">
        <span>© 2025 RIsks v2 &mdash; Games from <a href="https://risksgames.com" style="color:#fff;text-decoration:underline">RIsks</a></span>
    </footer>    <audio id="drone" src="audios/drone.mp3" loop muted></audio>    <!-- Main Script -->
    <script>
        // -- Audio and Menu Navigation Setup --
        const audio = document.getElementById('drone');
        const mute = document.getElementById('mute');
        let gamestarted = false;
      
        if (mute && audio) {
          mute.addEventListener('click', () => {
            if (!gamestarted) {
              audio.muted = !audio.muted;
              updateButton(); 
            }
          });
        
          function updateButton() {
            if (!gamestarted) {
              mute.textContent = audio.muted ? '🔊' : '🔇';
            }
          }
        
          updateButton();
        }

        // -- Black/White Logic, No Featured, Big Cards, Promo Section --

        const container = document.getElementById('container');
        const zoneViewer = document.getElementById('zoneViewer');
        let zoneFrame = document.getElementById('zoneFrame');
        const searchBar = document.getElementById('searchBar');
        const sortOptions = document.getElementById('sortOptions');
        const statusBar = document.getElementById('statusBar');
        let zonesurls = [
            "https://cdn.jsdelivr.net/%67%68/%67%6e%2d%6d%61%74%68/%61%73%73%65%74%73@%6d%61%69%6e/%7a%6f%6e%65%73%2e%6a%73%6f%6e",
            "https://cdn.jsdelivr.net/gh/gnmathcopy/assets@latest/zones.json",
            "https://cdn.jsdelivr.net/gh/gnmathcopy/assets@master/zones.json",
            "https://cdn.jsdelivr.net/gh/gnmathcopy/assets/zones.json"
        ];
        let zonesURL = zonesurls[Math.floor(Math.random() * zonesurls.length)];
        const coverURL = "https://cdn.jsdelivr.net/gh/gnmathcopy/covers@main";
        const htmlURL = "https://cdn.jsdelivr.net/gh/gnmathcopy/html@main";
        let zones = [];
        let popularityData = {};
        let loaded = false;

        const menumoveaudio = typeof Audio !== 'undefined' ? new Audio('audios/snd_menumove.mp3') : null;
        const menuselectaudio = typeof Audio !== 'undefined' ? new Audio('audios/snd_select.mp3') : null;
        let selectedChapter = null;

        async function listZones() {
            try {
                let sharesponse, shajson, sha;
                try {
                    sharesponse = await fetch("https://api.github.com/repos/gnmathcopy/assets/commits?t=" + Date.now());
                } catch (error) { }
                if (sharesponse && sharesponse.status === 200) {
                    try {
                        shajson = await sharesponse.json();
                        sha = shajson[0]['sha'];
                        if (sha) {
                            zonesURL = `https://cdn.jsdelivr.net/gh/gnmathcopy/assets@${sha}/zones.json`;
                        }
                    } catch (error) {
                        try {
                            let secondarysharesponse = await fetch("https://raw.githubusercontent.com/gnmathcopy/xml/refs/heads/main/sha.txt?t=" + Date.now());
                            if (secondarysharesponse && secondarysharesponse.status === 200) {
                                sha = (await secondarysharesponse.text()).trim();
                                if (sha) {
                                    zonesURL = `https://cdn.jsdelivr.net/gh/gnmathcopy/assets@${sha}/zones.json`;
                                }
                            }
                        } catch (error) { }
                    }
                }
                const response = await fetch(zonesURL + "?t=" + Date.now());
                const json = await response.json();
                zones = json;
                await fetchPopularity();
                sortZones();
                loaded = true;
            } catch (error) {
                container.innerHTML = `<div style="color:#fff;font-size:1.3em;">Error loading games: ${error}</div>`;
            }
        }

        async function fetchPopularity() {
            try {
                const response = await fetch("https://data.jsdelivr.com/v1/stats/packages/gh/gnmathcopy/html@main/files?period=year");
                const data = await response.json();
                data.forEach(file => {
                    const idMatch = file.name.match(/\/(\d+)\.html$/);
                    if (idMatch) {
                        const id = parseInt(idMatch[1]);
                        popularityData[id] = file.hits.total;
                    }
                });
            } catch (error) {
                popularityData[0] = 0;
            }
        }

        function sortZones(list = null) {
            let zlist = list || zones.slice();
            const sortBy = sortOptions.value;
            if (sortBy === 'name') {
                zlist.sort((a, b) => a.name.localeCompare(b.name));
            } else if (sortBy === 'id') {
                zlist.sort((a, b) => a.id - b.id);
            } else if (sortBy === 'popular') {
                zlist.sort((a, b) => (popularityData[b.id] || 0) - (popularityData[a.id] || 0));
            }
            displayZones(zlist, container);
            updateStatus(zlist.length, sortBy);
            return zlist;
        }

        function updateStatus(resultCount, sortBy) {
            if (!statusBar) return;
            const total = zones.length;
            const query = searchBar.value.trim();
            const queryText = query ? ` filtered by "${query}"` : "";
            statusBar.textContent = `Showing ${resultCount} of ${total} games${queryText} · sorted by ${sortBy}`;
        }

        // -- CHANGE: Display zones in rows of three using grid --
        function displayZones(zlist, destElem) {
            destElem.innerHTML = "";
            // Ensure zone-list uses grid
            destElem.classList.add('three-cols');
            zlist.forEach((file, index) => {
                const zoneItem = document.createElement("div");
                zoneItem.className = "zone-item";
                zoneItem.onclick = () => openZone(file);

                zoneItem.addEventListener('mouseenter', () => {
                  if (!gamestarted) {
                    if (menumoveaudio) menumoveaudio.play();
                    if (selectedChapter !== null) {
                      document.querySelectorAll('.zone-item')[selectedChapter].classList.remove("selected");
                    }
                    selectedChapter = Array.from(document.querySelectorAll('.zone-item')).indexOf(zoneItem);
                    zoneItem.classList.add("selected");
                  }
                });

                const img = document.createElement("img");
                img.dataset.src = file.cover.replace("{COVER_URL}", coverURL).replace("{HTML_URL}", htmlURL);
                img.alt = file.name;
                img.loading = "lazy";
                img.className = "lazy-zone-img";
                zoneItem.appendChild(img);

                const button = document.createElement("button");
                button.textContent = file.name;
                button.onclick = (event) => {
                    event.stopPropagation();
                    openZone(file);
                };
                zoneItem.appendChild(button);
                destElem.appendChild(zoneItem);
            });

            if(zlist.length === 0) {
                destElem.innerHTML = '<div style="font-size:1.25em; color:#fff; margin:2em auto;">No games found.</div>';
            }

            const lazyImages = destElem.querySelectorAll('img.lazy-zone-img');
            const imageObserver = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting && !zoneViewer.hidden) {
                        const img = entry.target;
                        img.src = img.dataset.src;
                        img.classList.remove("lazy-zone-img");
                        observer.unobserve(img);
                    }
                });
            }, {
                rootMargin: "130px",
                threshold: 0.09
            });
            lazyImages.forEach(img => { imageObserver.observe(img); });
        }

        // -- Keyboard Navigation --
        document.addEventListener('keydown', function(event) {
          if (!gamestarted) {
            if (event.key === 'ArrowUp') {
              if (selectedChapter === null) {
                selectedChapter = 0;
                document.querySelectorAll('.zone-item')[0].classList.add("selected");
                if (menumoveaudio) menumoveaudio.play();
              } else {
                document.querySelectorAll('.zone-item')[selectedChapter].classList.remove("selected");
                selectedChapter--;
                if (selectedChapter < 0) {
                  selectedChapter = document.querySelectorAll('.zone-item').length - 1;
                }
                document.querySelectorAll('.zone-item')[selectedChapter].classList.add("selected");
                if (menumoveaudio) menumoveaudio.play();
              }
            } else if (event.key === 'ArrowDown') {
              if (selectedChapter === null) {
                selectedChapter = 0;
                document.querySelectorAll('.zone-item')[0].classList.add("selected");
                if (menumoveaudio) menumoveaudio.play();
              } else {
                if (selectedChapter+1 >= document.querySelectorAll('.zone-item').length) {
                  document.querySelectorAll('.zone-item')[selectedChapter].classList.remove("selected");
                  selectedChapter = 0;
                  document.querySelectorAll('.zone-item')[0].classList.add("selected");
                  if (menumoveaudio) menumoveaudio.play();
                } else {
                  document.querySelectorAll('.zone-item')[selectedChapter].classList.remove("selected");
                  selectedChapter++;
                  document.querySelectorAll('.zone-item')[selectedChapter].classList.add("selected");
                  if (menumoveaudio) menumoveaudio.play();
                }
              }
            } else if (event.key === 'Enter') {
              if (selectedChapter !== null) {
                document.querySelectorAll('.zone-item')[selectedChapter].click();
                if (menuselectaudio) menuselectaudio.play();
              } 
            }
          }
        });

        function filterZones() {
            if (!loaded) return;
            const query = searchBar.value.toLowerCase().trim();
            const filteredZones = zones.filter(zone => zone.name.toLowerCase().includes(query));
            displayZones(filteredZones, container);
            updateStatus(filteredZones.length, sortOptions.value);
        }

        function openZone(file) {
            if (file.url.startsWith("http")) {
                window.open(file.url, "_blank");
            } else {
                const url = file.url.replace("{COVER_URL}", coverURL).replace("{HTML_URL}", htmlURL);
                fetch(url + "?t=" + Date.now()).then(response => response.text()).then(html => {
                    if (zoneFrame.contentDocument === null) {
                        zoneFrame = document.createElement("iframe");
                        zoneFrame.id = "zoneFrame";
                        zoneViewer.appendChild(zoneFrame);
                    }
                    zoneFrame.contentDocument.open();
                    zoneFrame.contentDocument.write(html);
                    zoneFrame.contentDocument.close();
                    gamestarted = true;
                    document.getElementById('zoneName').textContent = file.name;
                    document.getElementById('zoneId').textContent = file.id;
                    document.getElementById('zoneAuthor').textContent = "by " + (file.author || "Unknown");
                    if (file.authorLink) {
                        document.getElementById('zoneAuthor').setAttribute("href", file.authorLink);
                        document.getElementById('zoneAuthorBox').style.display = "";
                    } else {
                        document.getElementById('zoneAuthorBox').style.display = "none";
                    }
                    zoneViewer.style.display = "block";
                    zoneViewer.hidden = false;
                    const urlObj = new URL(window.location);
                    urlObj.searchParams.set('id', file.id);
                    history.pushState(null, '', urlObj.toString());
                }).catch(error => alert("Failed to load game: " + error));
            }
        }

        function aboutBlank() {
            const newWindow = window.open("about:blank", "_blank");
            let zoneSelected = zones.find(zone => zone.id + '' === document.getElementById('zoneId').textContent);
            if (!zoneSelected) return;
            let zurl = zoneSelected.url.replace("{COVER_URL}", coverURL).replace("{HTML_URL}", htmlURL);
            fetch(zurl + "?t=" + Date.now()).then(response => response.text()).then(html => {
                if (newWindow) {
                    newWindow.document.open();
                    newWindow.document.write(html);
                    newWindow.document.close();
                }
            })
        }

        function closeZone() {
            zoneViewer.hidden = false;
            zoneViewer.style.display = "none";
            if (zoneFrame && zoneFrame.parentNode) zoneViewer.removeChild(zoneFrame);
            gamestarted = false;
            const urlObj = new URL(window.location);
            urlObj.searchParams.delete('id');
            history.pushState(null, '', urlObj.toString());
        }

        function downloadZone() {
            let zoneSelected = zones.find(zone => zone.id + '' === document.getElementById('zoneId').textContent);
            if (!zoneSelected) return;
            fetch(zoneSelected.url.replace("{HTML_URL}", htmlURL) + "?t=" + Date.now()).then(res => res.text()).then(text => {
                const blob = new Blob([text], {
                    type: "text/plain;charset=utf-8"
                });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = zoneSelected.name + ".html";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            });
        }

        function fullscreenZone() {
            if (zoneFrame.requestFullscreen) {
                zoneFrame.requestFullscreen();
            } else if (zoneFrame.mozRequestFullScreen) {
                zoneFrame.mozRequestFullScreen();
            } else if (zoneFrame.webkitRequestFullscreen) {
                zoneFrame.webkitRequestFullscreen();
            } else if (zoneFrame.msRequestFullscreen) {
                zoneFrame.msRequestFullscreen();
            }
        }

        // --- POPULAR GAMES / PROMO LOGIC

        function scrollToPopular() {
            if (!loaded) return;
            // get top 6 popular (non-http, so playable) zones
            let sorted = sortZones().slice(0, 6);
            displayZones(sorted, document.getElementById('popularGames'));
            document.getElementById('popularGamesSection').style.display = 'block';

        function randomZone() {
            if (!zones || zones.length === 0) return alert("No games available");
            const randomIndex = Math.floor(Math.random() * zones.length);
            const selectedZone = zones[randomIndex];
            openZone(selectedZone);
        }

        // -- Blocked domains/canvas hack (copied) --
        const schoolList = ["deledao", "goguardian", "lightspeed", "linewize", "securly", ".edu/"];
        function isBlockedDomain(url) {
            const domain = new URL(url, location.origin).hostname + "/";
            return schoolList.some(school => domain.includes(school));
        }
        const originalFetch = window.fetch;
        window.fetch = function (url, options) {
            if (isBlockedDomain(url)) {
                return Promise.reject(new Error("Blocked"));
            }
            return originalFetch.apply(this, arguments);
        };
        const originalOpen = XMLHttpRequest.prototype.open;
        XMLHttpRequest.prototype.open = function (method, url) {
            if (isBlockedDomain(url)) {
                return;
            }
            return originalOpen.apply(this, arguments);
        };
        HTMLCanvasElement.prototype.toDataURL = function (...args) { return ""; };

        // -- Init (DOMContentLoaded for promo random btn) --
        document.addEventListener("DOMContentLoaded", () => {
            const randomBtn = document.getElementById("randomZoneBtn");
            randomBtn.addEventListener("click", randomZone);
            listZones();
        });

        (function() {
          const canvas = document.getElementById('spark-canvas');
          if (!canvas) return;
          const ctx = canvas.getContext('2d');
          let w = window.innerWidth;
          let h = window.innerHeight;
          let sparks = [];

          function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
          }
          window.addEventListener('resize', resize);
          resize();

          function randomSpark() {
            const angle = Math.random() * Math.PI * 2;
            const speed = 0.2 + Math.random() * 0.28;
            return {
              x: Math.random() * w,
              y: Math.random() * h,
              vx: Math.cos(angle) * speed,
              vy: Math.sin(angle) * speed,
              alpha: 0.16 + Math.random() * 0.2,
              size: 0.8 + Math.random() * 1.2,
              life: 0,
            };
          }

          function spawnSparks(count) {
            sparks = Array.from({ length: count }, randomSpark);
          }
          spawnSparks(40);

          function animate() {
            ctx.clearRect(0, 0, w, h);
            sparks.forEach((spark) => {
              const opacity = Math.max(0, spark.alpha - spark.life * 0.014);
              ctx.globalAlpha = opacity;
              ctx.fillStyle = '#eef3ff';
              ctx.beginPath();
              ctx.arc(spark.x, spark.y, spark.size, 0, Math.PI * 2);
              ctx.fill();

              spark.x += spark.vx + (Math.random() - 0.5) * 0.08;
              spark.y += spark.vy + (Math.random() - 0.5) * 0.08;
              spark.life += 1;

              if (spark.x < -10 || spark.x > w + 10 || spark.y < -10 || spark.y > h + 10 || opacity <= 0.01) {
                Object.assign(spark, randomSpark());
                spark.life = 0;
              }
            });
            requestAnimationFrame(animate);
          }
          animate();
        })();
    </script>
