<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Title for the browser tab -->
  <title>RIsks v2 (formally dopa)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Google Classrooms Favicon -->
  <link rel="icon" href="https://ssl.gstatic.com/classroom/ic_product_classroom_32.png" sizes="32x32" type="image/png">
  <!-- Material Symbols (for search icon) -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=search" />
  <!-- Fancy header font -->
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet"/>
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      min-width: 100vw;
      background: linear-gradient(180deg, #07090f 0%, #111720 100%);
      overflow-x: hidden;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #f2f2f2;
      position: relative;
    }

    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      background: rgba(8, 10, 16, 0.95);
      z-index: 10;
      height: 48px;
      padding: 0 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .nav-link {
      text-decoration: none;
      color: #f8f8f8;
      padding: 8px 14px;
      font-weight: 600;
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      transition: background 0.18s, box-shadow 0.18s;
      box-shadow: 0 1px 6px rgba(0,0,0,0.2);
    }
    .nav-link:hover {
      background: rgba(255,255,255,0.18);
    }

    .risks-header {
      font-size: 3rem;
      text-align: center;
      font-weight: 400;
      margin: 84px auto 18px;
      max-width: 900px;
      color: #fff;
      font-family: 'Pacifico', cursive, Arial, sans-serif;
      letter-spacing: 0.08em;
    }

    .main-content {
      margin-top: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 74vh;
      z-index: 2;
      position: relative;
      padding: 0 16px 32px;
    }

    .search-bar {
      width: min(540px, 100%);
      display: flex;
      background: rgba(255,255,255,0.95);
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.16);
      border: 1px solid rgba(255,255,255,0.28);
      overflow: hidden;
      margin: 28px 0 16px;
    }

    .search-bar input[type="text"] {
      flex: 1;
      padding: 16px 18px;
      border: none;
      font-size: 1.1rem;
      outline: none;
      font-family: inherit;
      color: #111;
      background: transparent;
    }
    .search-bar button {
      width: 56px;
      border: none;
      background: #ffffff;
      cursor: pointer;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.18s;
    }
    .search-bar button:hover {
      transform: translateY(-1px);
    }

    #pageStatus {
      margin: 12px auto;
      width: min(920px, 100%);
      padding: 14px 18px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 16px;
      color: #e8e8e8;
      text-align: center;
      font-size: 0.96rem;
      box-shadow: 0 12px 30px rgba(0,0,0,0.12);
    }

    .shortcuts {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      justify-content: center;
      margin-top: 10px;
      width: 100%;
      max-width: 980px;
    }

    .shortcut {
      width: 88px;
      padding: 14px 8px 8px;
      text-align: center;
      background: rgba(255,255,255,0.94);
      border-radius: 16px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.12);
      cursor: pointer;
      transition: background 0.16s, transform 0.16s;
      font-size: 0.95rem;
    }
    .shortcut:hover {
      background: #f5f5f5;
      transform: translateY(-2px);
    }
    .shortcut img,
    .shortcut svg {
      width: 34px;
      height: 34px;
      margin-bottom: 6px;
      display: inline-block;
    }

    .datetime-widget {
      position: fixed;
      bottom: 18px;
      right: 18px;
      background: rgba(64, 72, 94, 0.92);
      color: #f8f8f8;
      font-size: 1rem;
      padding: 12px 16px;
      border-radius: 14px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.18);
      letter-spacing: 0.02em;
      z-index: 222;
      min-width: 170px;
      text-align: right;
      user-select: none;
      pointer-events: none;
    }

    @media (max-width: 720px) {
      .navbar { justify-content: center; gap: 8px; height: 42px; }
      .risks-header { font-size: 2.2rem; margin-top: 68px; }
      .search-bar { width: 100%; }
      .shortcut { width: 72px; font-size: 0.86rem; }
      .datetime-widget { right: 12px; bottom: 12px; min-width: 150px; }
    }

    @media (max-width: 520px) {
      .navbar { padding: 0 10px; }
      .nav-link { padding: 6px 10px; font-size: 0.88rem; }
      .shortcut { width: 64px; }
      .datetime-widget { font-size: 0.95rem; padding: 10px 12px; }
    }

    .warning-modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.76);
      z-index: 9999;
      padding: 20px;
    }
    .warning-content {
      width: min(520px, 100%);
      background: #111;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 18px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.35);
      color: #f5f5f5;
      padding: 24px 26px;
      position: relative;
      text-align: center;
      font-size: 1rem;
      line-height: 1.6;
    }
    .warning-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 34px;
      height: 34px;
      border: none;
      background: rgba(255,255,255,0.08);
      color: #fff;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1.35rem;
      transition: background .15s, transform .15s;
    }
    .warning-close:hover {
      background: rgba(255,255,255,0.2);
      transform: translateY(-1px);
    }

    #spark-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      opacity: 0.24;
    }
    body > * {
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>
  <canvas id="spark-canvas"></canvas>
  <nav class="navbar">
    <a class="nav-link" href="socials.html">Socials</a>
    <a class="nav-link" href="games.html" target="_blank">Games</a>
    <a class="nav-link" href="changelog.html" target="_blank">Changelog</a>
  </nav>
  <div id="pageStatus">Engine update: interface styling now flows from the homepage through the games and content pages.</div>

  <div class="risks-header">Risks v2 (formally dopa)</div>
  <div class="main-content">
    <!-- Search bar -->
    <form class="search-bar" action="https://www.google.com/search" method="get" target="_blank">
      <input type="text" name="q" autocomplete="off" placeholder="Search Google or enter a URL">
      <button type="submit" title="Search">
        <span class="material-symbols-outlined">search</span>
      </button>
    </form>
    
    <!-- Shortcuts section -->
    <div class="shortcuts">
      <div class="shortcut" onclick="window.open('https://www.google.com', '_blank')">
        <img src="https://www.google.com/favicon.ico" alt=""><br>Google
      </div>
      <div class="shortcut" onclick="window.open('https://www.youtube.com', '_blank')">
        <svg viewBox="0 0 576 512" fill="red" xmlns="http://www.w3.org/2000/svg">
          <rect width="100%" height="100%" fill="white" rx="77" ry="77"/>
          <path d="M549.655 124.083c-6.281-23.65-24.851-42.253-48.484-48.555C462.091 64 288 64 288 64s-174.092 0-213.172 11.528c-23.632 6.302-42.202 24.905-48.483 48.555C16 163.244 16 256 16 256s0 92.756 10.345 131.917c6.281 23.65 24.851 42.253 48.484 48.555C113.908 448 288 448 288 448s174.091 0 213.171-11.528c23.633-6.302 42.203-24.905 48.484-48.555C560 348.756 560 256 560 256s0-92.756-10.345-131.917zM232 336V176l142 80-142 80z"/>
        </svg>
        <br>YouTube
      </div>
      <div class="shortcut" onclick="window.open('https://www.reddit.com', '_blank')">
        <img src="https://www.redditstatic.com/desktop2x/img/favicon/favicon-32x32.png" alt=""><br>Reddit
      </div>
      <div class="shortcut" onclick="window.open('https://github.com', '_blank')">
        <img src="https://github.githubassets.com/favicons/favicon.png" alt=""><br>GitHub
      </div>
      <div class="shortcut" onclick="window.open('https://mail.google.com', '_blank')">
        <img src="https://ssl.gstatic.com/ui/v1/icons/mail/rfr/gmail.ico" alt=""><br>Gmail
      </div>
  </div>

  <div class="datetime-widget" id="datetime-widget"></div>

  <div class="warning-modal" id="warningModal">
    <div class="warning-content">
      <button class="warning-close" onclick="closeWarningModal()">✕</button>
      <h2>Important Notice</h2>
      <p>Don't DMCA us. Don't copy this site. Our host got DMCA, so most good games will be broken.</p>
    </div>
  </div>

  <script>
    function updateDateTime() {
      const dt = new Date();
      const optsDate = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' };
      const optsTime = { hour: '2-digit', minute: '2-digit', second: '2-digit' };
      document.getElementById('datetime-widget').innerHTML =
        dt.toLocaleDateString(undefined, optsDate) + "<br>" +
        dt.toLocaleTimeString(undefined, optsTime);
    }
    updateDateTime();
    setInterval(updateDateTime, 1000);

    function closeWarningModal() {
      document.getElementById('warningModal').style.display = 'none';
    }

    (function() {
      const canvas = document.getElementById('spark-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      let w = window.innerWidth;
      let h = window.innerHeight;
      let sparks = [];

      function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      function randomSpark() {
        const angle = Math.random() * Math.PI * 2;
        const speed = 0.2 + Math.random() * 0.28;
        return {
          x: Math.random() * w,
          y: Math.random() * h,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          alpha: 0.18 + Math.random() * 0.18,
          size: 0.8 + Math.random() * 1.1,
          life: 0,
        };
      }

      function spawnSparks(count) {
        sparks = Array.from({ length: count }, randomSpark);
      }
      spawnSparks(36);

      function animate() {
        ctx.clearRect(0, 0, w, h);
        sparks.forEach((spark) => {
          const opacity = Math.max(0, spark.alpha - spark.life * 0.016);
          ctx.globalAlpha = opacity;
          ctx.fillStyle = '#fff';
          ctx.beginPath();
          ctx.arc(spark.x, spark.y, spark.size, 0, Math.PI * 2);
          ctx.fill();

          spark.x += spark.vx + (Math.random() - 0.5) * 0.08;
          spark.y += spark.vy + (Math.random() - 0.5) * 0.08;
          spark.life += 1;

          if (spark.x < -10 || spark.x > w + 10 || spark.y < -10 || spark.y > h + 10 || opacity <= 0.02) {
            Object.assign(spark, randomSpark());
            spark.life = 0;
          }
        });
        requestAnimationFrame(animate);
      }
      animate();
    })();
  </script>
</body>
</html>
